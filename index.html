<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Work Calendar Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-blue: #38bdf8;
      --accent-purple: #c084fc;
      --accent-green: #34d399;
      --accent-red: #f87171;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif; }
    
    body {
      background: #090d16;
      background-image: 
        radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.12) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(192, 132, 252, 0.1) 0px, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      max-width: 950px;
      margin: 0 auto;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      box-shadow: 0 4px 20px rgba(56, 189, 248, 0.3);
    }

    h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
    p.subtitle { font-size: 0.8rem; color: var(--text-muted); }

    /* Dashboard Stats */
    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
      padding: 14px;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-val { font-size: 1.5rem; font-weight: 700; color: var(--accent-blue); }
    .stat-lbl { font-size: 0.75rem; color: var(--text-muted); }

    /* Controls & Filters */
    .toolbar {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
      padding: 14px;
      border-radius: 16px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .month-title {
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(to right, #38bdf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn {
      padding: 8px 14px;
      border-radius: 10px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.05);
      color: var(--text-main);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }
    .btn-primary { background: linear-gradient(135deg, #38bdf8, #6366f1); border: none; }
    .btn-primary:hover { opacity: 0.9; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4); }

    .filter-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .search-input {
      width: 100%;
      padding: 8px 12px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: #fff;
      font-size: 0.85rem;
    }

    /* Calendar Grid */
    .calendar-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
      padding: 16px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .grid-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .grid-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day-cell {
      min-height: 95px;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .day-cell:hover {
      border-color: var(--accent-blue);
      background: rgba(56, 189, 248, 0.05);
    }

    .day-cell.today {
      border-color: var(--accent-blue);
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.25);
    }

    .day-num {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    .today .day-num {
      color: #fff;
      background: var(--accent-blue);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Tags */
    .event-chip {
      font-size: 0.7rem;
      padding: 4px 6px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      color: #fff;
      font-weight: 500;
      line-height: 1.1;
    }

    .event-chip.completed { opacity: 0.4; text-decoration: line-through; }
    .tag-work { background: rgba(56, 189, 248, 0.25); border: 1px solid rgba(56, 189, 248, 0.5); color: #7dd3fc; }
    .tag-meeting { background: rgba(192, 132, 252, 0.25); border: 1px solid rgba(192, 132, 252, 0.5); color: #e9d5ff; }
    .tag-urgent { background: rgba(248, 113, 113, 0.25); border: 1px solid rgba(248, 113, 113, 0.5); color: #fca5a5; }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 16px;
    }

    .modal-card {
      background: #1e293b;
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 20px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal-card input, .modal-card select {
      width: 100%;
      padding: 10px 12px;
      background: #0f172a;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: #fff;
    }

    .event-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <div>
        <h1>Smart Work Calendar</h1>
        <p class="subtitle">AI-Powered Executive Workspace</p>
      </div>
    </div>
    <div>
      <button class="btn" onclick="exportJSON()">💾 Export</button>
      <button class="btn" onclick="document.getElementById('fileInput').click()">📥 Import</button>
      <input type="file" id="fileInput" hidden onchange="importJSON(event)">
    </div>
  </header>

  <!-- Dashboard Overview -->
  <div class="dashboard">
    <div class="stat-card">
      <div class="stat-val" id="totalTasks">0</div>
      <div class="stat-lbl">งานทั้งหมดเดือนนี้</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color: var(--accent-green)" id="completedTasks">0</div>
      <div class="stat-lbl">ทำเสร็จแล้ว</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color: var(--accent-red)" id="urgentTasks">0</div>
      <div class="stat-lbl">งานด่วนที่สุด</div>
    </div>
  </div>

  <!-- Control Toolbar -->
  <div class="toolbar">
    <div class="nav-bar">
      <button class="btn" onclick="changeMonth(-1)">❮ ก่อนหน้า</button>
      <div class="month-title" id="monthYearText"></div>
      <button class="btn" onclick="changeMonth(1)">ถัดไป ❯</button>
    </div>
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 ค้นหากิจกรรม..." oninput="renderCalendar()">
  </div>

  <!-- Calendar View -->
  <div class="calendar-card">
    <div class="grid-header">
      <div>อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div>ส</div>
    </div>
    <div class="grid-days" id="daysGrid"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-card">
    <h3 id="modalDateTitle">จัดการกิจกรรม</h3>
    
    <div id="existingEvents"></div>

    <hr style="border-color: var(--card-border)">

    <h4>+ เพิ่มกิจกรรมใหม่</h4>
    <input type="text" id="newTitle" placeholder="ชื่อกิจกรรม...">
    <select id="newType">
      <option value="work">💼 งานทั่วไป (Work)</option>
      <option value="meeting">🤝 ประชุม (Meeting)</option>
      <option value="urgent">🔥 ด่วนที่สุด (Urgent)</option>
    </select>

    <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px;">
      <button class="btn" onclick="closeModal()">ปิด</button>
      <button class="btn btn-primary" onclick="addEvent()">เพิ่มงาน</button>
    </div>
  </div>
</div>

<script>
  let currDate = new Date();
  let events = JSON.parse(localStorage.getItem('smart_cal_v2') || '{}');
  let selectedDate = '';

  const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

  function renderCalendar() {
    const y = currDate.getFullYear();
    const m = currDate.getMonth();
    document.getElementById('monthYearText').innerText = `${months[m]} ${y + 543}`;

    const firstDay = new Date(y, m, 1).getDay();
    const totalDays = new Date(y, m + 1, 0).getDate();
    const todayStr = new Date().toISOString().split('T')[0];
    const search = document.getElementById('searchInput').value.toLowerCase();

    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';

    let total = 0, completed = 0, urgent = 0;

    for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

    for (let d = 1; d <= totalDays; d++) {
      const dateKey = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cell = document.createElement('div');
      cell.className = 'day-cell' + (dateKey === todayStr ? ' today' : '');
      cell.innerHTML = `<div class="day-num">${d}</div>`;

      if (events[dateKey]) {
        events[dateKey].forEach((evt, idx) => {
          total++;
          if (evt.done) completed++;
          if (evt.type === 'urgent') urgent++;

          if (!search || evt.title.toLowerCase().includes(search)) {
            const chip = document.createElement('div');
            chip.className = `event-chip tag-${evt.type} ${evt.done ? 'completed' : ''}`;
            chip.innerText = evt.title;
            cell.appendChild(chip);
          }
        });
      }

      cell.onclick = () => openModal(dateKey);
      grid.appendChild(cell);
    }

    document.getElementById('totalTasks').innerText = total;
    document.getElementById('completedTasks').innerText = completed;
    document.getElementById('urgentTasks').innerText = urgent;
  }

  function openModal(dateKey) {
    selectedDate = dateKey;
    document.getElementById('modalDateTitle').innerText = `📅 กิจกรรมวันที่ ${dateKey}`;
    renderModalEvents();
    document.getElementById('modal').style.display = 'flex';
  }

  function renderModalEvents() {
    const container = document.getElementById('existingEvents');
    container.innerHTML = '';
    const list = events[selectedDate] || [];

    if (list.length === 0) {
      container.innerHTML = `<p style="font-size:0.8rem; color:var(--text-muted)">ไม่มีกิจกรรมในวันนี้</p>`;
      return;
    }

    list.forEach((evt, idx) => {
      const item = document.createElement('div');
      item.className = 'event-list-item';
      item.innerHTML = `
        <span style="${evt.done ? 'text-decoration: line-through; opacity: 0.5;' : ''}">${evt.title}</span>
        <div>
          <button class="btn" style="padding:2px 6px;" onclick="toggleDone(${idx})">${evt.done ? '↩️' : '✓'}</button>
          <button class="btn" style="padding:2px 6px; color:var(--accent-red);" onclick="deleteEvt(${idx})">🗑️</button>
        </div>
      `;
      container.appendChild(item);
    });
  }

  function addEvent() {
    const title = document.getElementById('newTitle').value.trim();
    const type = document.getElementById('newType').value;
    if (!title) return;

    if (!events[selectedDate]) events[selectedDate] = [];
    events[selectedDate].push({ title, type, done: false });

    saveData();
    document.getElementById('newTitle').value = '';
    renderModalEvents();
    renderCalendar();
  }

  function toggleDone(idx) {
    events[selectedDate][idx].done = !events[selectedDate][idx].done;
    saveData();
    renderModalEvents();
    renderCalendar();
  }

  function deleteEvt(idx) {
    events[selectedDate].splice(idx, 1);
    saveData();
    renderModalEvents();
    renderCalendar();
  }

  function saveData() {
    localStorage.setItem('smart_cal_v2', JSON.stringify(events));
  }

  function closeModal() { document.getElementById('modal').style.display = 'none'; }
  function changeMonth(off) { currDate.setMonth(currDate.getMonth() + off); renderCalendar(); }

  function exportJSON() {
    const blob = new Blob([JSON.stringify(events)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `calendar_backup.json`;
    a.click();
  }

  function importJSON(e) {
    const file = e.target.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = (evt) => {
      events = JSON.parse(evt.target.result);
      saveData();
      renderCalendar();
    };
    r.readAsText(file);
  }

  renderCalendar();
</script>
</body>
</html>
