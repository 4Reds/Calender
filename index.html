<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Calendar Pro AI Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #090d16;
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-blue: #38bdf8;
      --accent-purple: #c084fc;
      --accent-green: #34d399;
      --accent-red: #f87171;
      --accent-amber: #fbbf24;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif; }
    
    body {
      background: var(--bg-main);
      background-image: 
        radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.12) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(192, 132, 252, 0.1) 0px, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      padding: 16px;
    }

    .container { max-width: 980px; margin: 0 auto; }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      box-shadow: 0 4px 20px rgba(56, 189, 248, 0.3);
    }

    h1 { font-size: 1.4rem; font-weight: 700; }
    p.subtitle { font-size: 0.8rem; color: var(--text-muted); }

    /* AI Command Box */
    .ai-box {
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(192, 132, 252, 0.15));
      border: 1px solid rgba(56, 189, 248, 0.3);
      backdrop-filter: blur(12px);
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 20px;
    }

    .ai-box label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: var(--accent-blue); }
    .ai-input-wrapper { display: flex; gap: 8px; }
    .ai-input {
      flex: 1;
      padding: 10px 14px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: #fff;
      font-size: 0.9rem;
    }

    /* Dashboard Stats */
    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
      padding: 14px;
      border-radius: 14px;
    }

    .stat-val { font-size: 1.4rem; font-weight: 700; color: var(--accent-blue); }
    .stat-lbl { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

    /* Controls & Toolbar */
    .toolbar {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
      padding: 14px;
      border-radius: 16px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .nav-bar { display: flex; justify-content: space-between; align-items: center; }
    .month-title {
      font-size: 1.2rem; font-weight: 700;
      background: linear-gradient(to right, #38bdf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn {
      padding: 8px 14px;
      border-radius: 10px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.05);
      color: var(--text-main);
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { background: rgba(255,255,255,0.12); }
    .btn-primary { background: linear-gradient(135deg, #38bdf8, #6366f1); border: none; }

    /* Calendar Grid */
    .calendar-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
      padding: 16px;
      border-radius: 20px;
    }

    .grid-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 0.8rem; font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .grid-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }

    .day-cell {
      min-height: 100px;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .day-cell:hover { border-color: var(--accent-blue); background: rgba(56, 189, 248, 0.05); }
    .day-cell.today { border-color: var(--accent-blue); }

    .day-header-row { display: flex; justify-content: space-between; align-items: center; }
    .day-num { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); }
    .today .day-num {
      color: #fff; background: var(--accent-blue);
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    .busy-warning { font-size: 0.65rem; color: var(--accent-amber); font-weight: bold; }

    /* Tags */
    .event-chip {
      font-size: 0.7rem; padding: 3px 6px; border-radius: 6px;
      color: #fff; font-weight: 500; line-height: 1.1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .event-chip.completed { opacity: 0.4; text-decoration: line-through; }
    .tag-work { background: rgba(56, 189, 248, 0.25); border: 1px solid rgba(56, 189, 248, 0.5); color: #7dd3fc; }
    .tag-meeting { background: rgba(192, 132, 252, 0.25); border: 1px solid rgba(192, 132, 252, 0.5); color: #e9d5ff; }
    .tag-urgent { background: rgba(248, 113, 113, 0.25); border: 1px solid rgba(248, 113, 113, 0.5); color: #fca5a5; }

    /* Modal */
    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
      justify-content: center; align-items: center; z-index: 100; padding: 16px;
    }
    .modal-card {
      background: #1e293b; border: 1px solid var(--card-border);
      border-radius: 20px; padding: 20px; width: 100%; max-width: 420px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .modal-card input, .modal-card select {
      width: 100%; padding: 10px 12px; background: #0f172a;
      border: 1px solid var(--card-border); border-radius: 8px; color: #fff;
    }
    .event-list-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 6px;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="brand">
      <div class="brand-icon">🧠</div>
      <div>
        <h1>Smart Calendar Pro</h1>
        <p class="subtitle">AI & Productivity Workspace</p>
      </div>
    </div>
    <div>
      <button class="btn" onclick="exportJSON()">💾 Export</button>
      <button class="btn" onclick="document.getElementById('fileInput').click()">📥 Import</button>
      <input type="file" id="fileInput" hidden onchange="importJSON(event)">
    </div>
  </header>

  <!-- AI Quick Add Box -->
  <div class="ai-box">
    <label>✨ AI Quick Add (พิมพ์ภาษาพูดสั่งสร้างงานอัจฉริยะ):</label>
    <div class="ai-input-wrapper">
      <input type="text" class="ai-input" id="aiInput" placeholder="ตัวอย่าง: 'ประชุมทีม พรุ่งนี้ บ่ายสอง' หรือ 'ส่งรายงาน มะรืนนี้'">
      <button class="btn btn-primary" onclick="processAIInput()">สร้างด้วย AI</button>
    </div>
  </div>

  <!-- Executive Analytics Dashboard -->
  <div class="dashboard">
    <div class="stat-card">
      <div class="stat-val" id="streakVal">🔥 0 วัน</div>
      <div class="stat-lbl">Streak วินัยการเคลียร์งาน</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="completionRate">0%</div>
      <div class="stat-lbl">อัตรางานสำเร็จเดือนนี้</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color: var(--accent-purple)" id="meetingHours">0 ชม.</div>
      <div class="stat-lbl">ชั่วโมงประชุมโดยประมาณ</div>
    </div>
  </div>

  <!-- Control Toolbar -->
  <div class="toolbar">
    <div class="nav-bar">
      <button class="btn" onclick="changeMonth(-1)">❮ ก่อนหน้า</button>
      <div class="month-title" id="monthYearText"></div>
      <button class="btn" onclick="changeMonth(1)">ถัดไป ❯</button>
    </div>
  </div>

  <!-- Calendar View -->
  <div class="calendar-card">
    <div class="grid-header">
      <div>อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div>ส</div>
    </div>
    <div class="grid-days" id="daysGrid"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-card">
    <h3 id="modalDateTitle">จัดการกิจกรรม</h3>
    <div id="workloadAlert"></div>
    <div id="existingEvents"></div>

    <hr style="border-color: var(--card-border)">

    <h4>+ เพิ่มกิจกรรมด้วยตนเอง</h4>
    <input type="text" id="newTitle" placeholder="ชื่อกิจกรรม...">
    <select id="newType">
      <option value="work">💼 งานทั่วไป (Work)</option>
      <option value="meeting">🤝 ประชุม (Meeting)</option>
      <option value="urgent">🔥 ด่วนที่สุด (Urgent)</option>
    </select>

    <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px;">
      <button class="btn" onclick="closeModal()">ปิด</button>
      <button class="btn btn-primary" onclick="addEventManual()">เพิ่มงาน</button>
    </div>
  </div>
</div>

<script>
  let currDate = new Date();
  let events = JSON.parse(localStorage.getItem('smart_cal_pro') || '{}');
  let selectedDate = '';

  const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

  // AI Natural Language Parser Engine
  function processAIInput() {
    const text = document.getElementById('aiInput').value.trim();
    if (!text) return;

    let targetDate = new Date();
    
    // Relative date parsing
    if (text.includes('พรุ่งนี้')) {
      targetDate.setDate(targetDate.getDate() + 1);
    } else if (text.includes('มะรืน')) {
      targetDate.setDate(targetDate.getDate() + 2);
    }

    const year = targetDate.getFullYear();
    const month = String(targetDate.getMonth() + 1).padStart(2, '0');
    const day = String(targetDate.getDate()).padStart(2, '0');
    const dateKey = `${year}-${month}-${day}`;

    // Auto-Categorization Keyword Detection
    let type = 'work';
    const lower = text.toLowerCase();
    if (lower.includes('ส่ง') || lower.includes('รายงาน') || lower.includes('ไฟนอล') || lower.includes('ด่วน') || lower.includes('สอบ')) {
      type = 'urgent';
    } else if (lower.includes('ประชุม') || lower.includes('คุยงาน') || lower.includes('นัด') || lower.includes('meet')) {
      type = 'meeting';
    }

    // Clean title text
    let title = text.replace(/พรุ่งนี้|มะรืนนี้|พรุ่งนี้/g, '').trim();

    if (!events[dateKey]) events[dateKey] = [];
    events[dateKey].push({ title, type, done: false });

    saveData();
    document.getElementById('aiInput').value = '';
    renderCalendar();
    alert(`✨ AI สร้างกิจกรรม: "${title}" สำหรับวันที่ ${dateKey} เรียบร้อยแล้ว!`);
  }

  function renderCalendar() {
    const y = currDate.getFullYear();
    const m = currDate.getMonth();
    document.getElementById('monthYearText').innerText = `${months[m]} ${y + 543}`;

    const firstDay = new Date(y, m, 1).getDay();
    const totalDays = new Date(y, m + 1, 0).getDate();
    const todayStr = new Date().toISOString().split('T')[0];

    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';

    let total = 0, completed = 0, meetingCount = 0;

    for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

    for (let d = 1; d <= totalDays; d++) {
      const dateKey = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cell = document.createElement('div');
      cell.className = 'day-cell' + (dateKey === todayStr ? ' today' : '');

      const dayEvents = events[dateKey] || [];
      const isBusy = dayEvents.length >= 3;

      cell.innerHTML = `
        <div class="day-header-row">
          <div class="day-num">${d}</div>
          ${isBusy ? '<div class="busy-warning">⚠️ แน่น</div>' : ''}
        </div>
      `;

      dayEvents.forEach((evt) => {
        total++;
        if (evt.done) completed++;
        if (evt.type === 'meeting') meetingCount++;

        const chip = document.createElement('div');
        chip.className = `event-chip tag-${evt.type} ${evt.done ? 'completed' : ''}`;
        chip.innerText = evt.title;
        cell.appendChild(chip);
      });

      cell.onclick = () => openModal(dateKey);
      grid.appendChild(cell);
    }

    // Update Analytics
    const rate = total > 0 ? Math.round((completed / total) * 100) : 0;
    document.getElementById('completionRate').innerText = `${rate}%`;
    document.getElementById('meetingHours').innerText = `${meetingCount * 1.5} ชม.`;
    
    // Calculate Streak
    calculateStreak();
  }

  function calculateStreak() {
    let streak = 0;
    let checkDate = new Date();

    for (let i = 0; i < 30; i++) {
      const key = checkDate.toISOString().split('T')[0];
      const dayList = events[key] || [];
      if (dayList.length > 0 && dayList.every(e => e.done)) {
        streak++;
      } else if (i > 0) {
        break;
      }
      checkDate.setDate(checkDate.getDate() - 1);
    }
    document.getElementById('streakVal').innerText = `🔥 ${streak} วัน`;
  }

  function openModal(dateKey) {
    selectedDate = dateKey;
    document.getElementById('modalDateTitle').innerText = `📅 กิจกรรมวันที่ ${dateKey}`;
    
    const dayList = events[dateKey] || [];
    const alertBox = document.getElementById('workloadAlert');
    if (dayList.length >= 3) {
      alertBox.innerHTML = `<p style="color:var(--accent-amber); font-size:0.8rem; background:rgba(251,191,36,0.1); padding:8px; border-radius:8px;">⚠️ วันนี้คุณมีภาระงานแน่นแล้ว (${dayList.length} งาน) แนะนำให้ย้ายงานบางส่วนไปวันอื่นเพื่อสร้างโฟกัส</p>`;
    } else {
      alertBox.innerHTML = '';
    }

    renderModalEvents();
    document.getElementById('modal').style.display = 'flex';
  }

  function renderModalEvents() {
    const container = document.getElementById('existingEvents');
    container.innerHTML = '';
    const list = events[selectedDate] || [];

    if (list.length === 0) {
      container.innerHTML = `<p style="font-size:0.8rem; color:var(--text-muted)">ไม่มีกิจกรรมในวันนี้</p>`;
      return;
    }

    list.forEach((evt, idx) => {
      const item = document.createElement('div');
      item.className = 'event-list-item';
      item.innerHTML = `
        <span style="${evt.done ? 'text-decoration: line-through; opacity: 0.5;' : ''}">${evt.title}</span>
        <div>
          <button class="btn" style="padding:2px 6px;" onclick="toggleDone(${idx})">${evt.done ? '↩️' : '✓'}</button>
          <button class="btn" style="padding:2px 6px; color:var(--accent-red);" onclick="deleteEvt(${idx})">🗑️</button>
        </div>
      `;
      container.appendChild(item);
    });
  }

  function addEventManual() {
    const title = document.getElementById('newTitle').value.trim();
    const type = document.getElementById('newType').value;
    if (!title) return;

    if (!events[selectedDate]) events[selectedDate] = [];
    events[selectedDate].push({ title, type, done: false });

    saveData();
    document.getElementById('newTitle').value = '';
    renderModalEvents();
    renderCalendar();
  }

  function toggleDone(idx) {
    events[selectedDate][idx].done = !events[selectedDate][idx].done;
    saveData();
    renderModalEvents();
    renderCalendar();
  }

  function deleteEvt(idx) {
    events[selectedDate].splice(idx, 1);
    saveData();
    renderModalEvents();
    renderCalendar();
  }

  function saveData() { localStorage.setItem('smart_cal_pro', JSON.stringify(events)); }
  function closeModal() { document.getElementById('modal').style.display = 'none'; }
  function changeMonth(off) { currDate.setMonth(currDate.getMonth() + off); renderCalendar(); }

  function exportJSON() {
    const blob = new Blob([JSON.stringify(events)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `smart_calendar_backup.json`;
    a.click();
  }

  function importJSON(e) {
    const file = e.target.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = (evt) => {
      events = JSON.parse(evt.target.result);
      saveData();
      renderCalendar();
    };
    r.readAsText(file);
  }

  renderCalendar();
</script>
</body>
</html>
