<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Work Calendar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #f4f6f9; color: #333; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    h1 { font-size: 1.5rem; color: #1a202c; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
    .btn-primary { background: #3182ce; color: #fff; }
    .btn-primary:hover { background: #2b6cb0; }
    .btn-outline { background: transparent; border: 1px solid #cbd5e0; color: #4a5568; }
    .btn-outline:hover { background: #edf2f7; }
    .calendar-controls { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
    .month-title { font-size: 1.25rem; font-weight: bold; width: 180px; text-align: center; }
    .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .day-header { text-align: center; font-weight: bold; padding: 8px; background: #edf2f7; border-radius: 6px; color: #4a5568; }
    .day-cell { min-height: 100px; border: 1px solid #e2e8f0; border-radius: 8px; padding: 6px; background: #fff; cursor: pointer; transition: 0.2s; }
    .day-cell:hover { border-color: #3182ce; background: #ebf8ff; }
    .day-number { font-weight: bold; margin-bottom: 4px; font-size: 0.9rem; color: #718096; }
    .day-cell.today .day-number { color: #3182ce; background: #ebf8ff; display: inline-block; padding: 2px 6px; border-radius: 4px; }
    .event-tag { font-size: 0.75rem; padding: 3px 6px; border-radius: 4px; margin-bottom: 4px; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tag-work { background: #3182ce; }
    .tag-meeting { background: #805ad5; }
    .tag-personal { background: #38a169; }
    .tag-urgent { background: #e53e3e; }
    /* Modal Styles */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #fff; padding: 24px; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .modal-content h3 { margin-bottom: 15px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
    .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #cbd5e0; border-radius: 6px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>📅 Smart Work Calendar</h1>
    <div>
      <button class="btn btn-outline" onclick="exportData()">💾 Backup (.json)</button>
      <button class="btn btn-outline" onclick="document.getElementById('importFile').click()">📥 Restore</button>
      <input type="file" id="importFile" style="display:none" onchange="importData(event)" accept=".json">
    </div>
  </header>

  <div class="calendar-controls">
    <button class="btn btn-outline" onclick="changeMonth(-1)">❮ ก่อนหน้า</button>
    <div class="month-title" id="monthDisplay"></div>
    <button class="btn btn-outline" onclick="changeMonth(1)">ถัดไป ❯</button>
  </div>

  <div class="grid" id="calendarGrid"></div>
</div>

<!-- Modal เพิ่ม/แก้ไขกิจกรรม -->
<div class="modal" id="eventModal">
  <div class="modal-content">
    <h3 id="modalTitle">เพิ่มกิจกรรม</h3>
    <div class="form-group">
      <label>ชื่อกิจกรรม</label>
      <input type="text" id="eventTitle" placeholder="เช่น ประชุมสรุปงานประจำสัปดาห์">
    </div>
    <div class="form-group">
      <label>หมวดหมู่</label>
      <select id="eventType">
        <option value="work">งานทั่วไป (Work)</option>
        <option value="meeting">ประชุม (Meeting)</option>
        <option value="personal">ส่วนตัว (Personal)</option>
        <option value="urgent">ด่วนที่สุด (Urgent)</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveEvent()">บันทึก</button>
    </div>
  </div>
</div>

<script>
  let currentDate = new Date();
  let events = JSON.parse(localStorage.getItem('smart_calendar_events') || '{}');
  let selectedDateKey = '';

  const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
  const dayHeaderNames = ["อา", "จ", "อ", "พ", "พฤ", "ศ", "ส"];

  function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    document.getElementById('monthDisplay').innerText = `${monthNames[month]} ${year + 543}`;
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    dayHeaderNames.forEach(day => {
      const el = document.createElement('div');
      el.className = 'day-header';
      el.innerText = day;
      grid.appendChild(el);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const totalDays = new Date(year, month + 1, 0).getDate();
    const todayStr = new Date().toISOString().split('T')[0];

    for (let i = 0; i < firstDay; i++) {
      grid.appendChild(document.createElement('div'));
    }

    for (let day = 1; day <= totalDays; day++) {
      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      if (dateStr === todayStr) cell.classList.add('today');

      cell.innerHTML = `<div class="day-number">${day}</div>`;

      if (events[dateStr]) {
        events[dateStr].forEach(evt => {
          const tag = document.createElement('div');
          tag.className = `event-tag tag-${evt.type}`;
          tag.innerText = evt.title;
          cell.appendChild(tag);
        });
      }

      cell.onclick = () => openModal(dateStr);
      grid.appendChild(cell);
    }
  }

  function changeMonth(offset) {
    currentDate.setMonth(currentDate.getMonth() + offset);
    renderCalendar();
  }

  function openModal(dateStr) {
    selectedDateKey = dateStr;
    document.getElementById('eventTitle').value = '';
    document.getElementById('eventModal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('eventModal').style.display = 'none';
  }

  function saveEvent() {
    const title = document.getElementById('eventTitle').value.trim();
    const type = document.getElementById('eventType').value;
    if (!title) return alert('กรุณากรอกชื่อกิจกรรม');

    if (!events[selectedDateKey]) events[selectedDateKey] = [];
    events[selectedDateKey].push({ title, type });

    localStorage.setItem('smart_calendar_events', JSON.stringify(events));
    closeModal();
    renderCalendar();
  }

  function exportData() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(events));
    const dlAnchor = document.createElement('a');
    dlAnchor.setAttribute("href", dataStr);
    dlAnchor.setAttribute("download", `calendar_backup_${new Date().toISOString().split('T')[0]}.json`);
    document.body.appendChild(dlAnchor);
    dlAnchor.click();
    dlAnchor.remove();
  }

  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(evt) {
      try {
        events = JSON.parse(evt.target.result);
        localStorage.setItem('smart_calendar_events', JSON.stringify(events));
        renderCalendar();
        alert('นำเข้าข้อมูลสำเร็จ!');
      } catch (err) {
        alert('ไฟล์ JSON ไม่ถูกต้อง');
      }
    };
    reader.readAsText(file);
  }

  renderCalendar();
</script>
</body>
</html>
